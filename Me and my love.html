<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Pink Story ♡</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'main-pink': '#ffb6c1',
                        'soft-pink': '#ffd6e7',
                        'cream': '#fff7fb',
                        'rose': '#ff8fab',
                        'lavender': '#e5d4ff',
                        'text-dark': '#5b4b57',
                    },
                    fontFamily: {
                        'handwritten': ['"Caveat"', 'cursive'],
                        'body': ['"Quicksand"', 'sans-serif'],
                        'display': ['"Playfair Display"', 'serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-slow': 'float 8s ease-in-out infinite',
                        'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
                        'fall': 'fall linear infinite',
                        'rise': 'rise 4s ease-out infinite',
                        'wiggle': 'wiggle 3s ease-in-out infinite',
                        'envelope-open': 'envelopeOpen 0.8s ease forwards',
                        'fade-in-up': 'fadeInUp 0.8s ease forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        pulseSoft: {
                            '0%, 100%': { transform: 'scale(1)', opacity: '1' },
                            '50%': { transform: 'scale(1.05)', opacity: '0.8' },
                        },
                        fall: {
                            '0%': { transform: 'translateY(-10vh) rotate(0deg)', opacity: '1' },
                            '100%': { transform: 'translateY(110vh) rotate(360deg)', opacity: '0.3' },
                        },
                        rise: {
                            '0%': { transform: 'translateY(0) scale(0.5)', opacity: '0' },
                            '50%': { opacity: '1' },
                            '100%': { transform: 'translateY(-100vh) scale(1.2)', opacity: '0' },
                        },
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-2deg)' },
                            '50%': { transform: 'rotate(2deg)' },
                        },
                        envelopeOpen: {
                            '0%': { transform: 'rotateX(0deg)' },
                            '100%': { transform: 'rotateX(-180deg)', opacity: '0' },
                        },
                        fadeInUp: {
                            '0%': { transform: 'translateY(40px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                    },
                },
            },
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --main-pink: #ffb6c1;
            --soft-pink: #ffd6e7;
            --cream: #fff7fb;
            --rose: #ff8fab;
            --lavender: #e5d4ff;
            --text-dark: #5b4b57;
        }

        * {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff7fb;
            color: #5b4b57;
            overflow-x: hidden;
            cursor: default;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fff7fb;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffb6c1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff8fab;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 182, 193, 0.35);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(255, 143, 171, 0.12);
        }

        .glass-strong {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 182, 193, 0.5);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(255, 143, 171, 0.18);
        }

        /* Polaroid frame */
        .polaroid {
            background: #fffefc;
            padding: 12px 12px 40px 12px;
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.06);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: rotate(-2deg);
            cursor: pointer;
        }
        .polaroid:nth-child(even) {
            transform: rotate(2deg);
        }
        .polaroid:nth-child(3n) {
            transform: rotate(-1.5deg);
        }
        .polaroid:hover {
            transform: rotate(0deg) scale(1.04);
            box-shadow: 0 16px 40px rgba(255, 143, 171, 0.25);
            z-index: 10;
        }
        .polaroid img {
            border-radius: 2px;
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
        }

        /* Masonry grid */
        .masonry-grid {
            column-count: 3;
            column-gap: 20px;
        }
        @media (max-width: 1024px) {
            .masonry-grid {
                column-count: 2;
            }
        }
        @media (max-width: 640px) {
            .masonry-grid {
                column-count: 1;
            }
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
        }

        /* Envelope styles */
        .envelope-wrapper {
            perspective: 800px;
            cursor: pointer;
        }
        .envelope {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 200px;
            margin: 0 auto;
            transition: transform 0.6s ease;
        }
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffd6e7 0%, #ffb6c1 100%);
            border-radius: 12px;
            clip-path: polygon(0 0, 50% 45%, 100% 0, 100% 100%, 0 100%);
            transform-origin: top center;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3;
            box-shadow: 0 4px 20px rgba(255, 143, 171, 0.25);
        }
        .envelope-body {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fffefc;
            border-radius: 12px;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            box-shadow: 0 4px 20px rgba(255, 143, 171, 0.15);
        }
        .envelope.open .envelope-flap {
            transform: rotateX(-180deg);
            opacity: 0.15;
        }
        .envelope-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            font-size: 28px;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .envelope.open .envelope-seal {
            opacity: 0;
        }

        /* Lightbox */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 15, 25, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Preloader */
        .preloader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff7fb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .preloader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .heart-loader {
            font-size: 60px;
            animation: heartbeat 0.8s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.25);
            }
            50% {
                transform: scale(1);
            }
            75% {
                transform: scale(1.2);
            }
        }

        /* Cassette tape styling */
        .cassette-player {
            background: linear-gradient(180deg, #2d1f2a 0%, #1a1018 100%);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.05);
            position: relative;
            border: 3px solid #3d2a35;
        }
        .cassette-player::before {
            content: '';
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 20px;
            background: rgba(255, 182, 193, 0.3);
            border-radius: 10px;
            pointer-events: none;
        }
        .cassette-label {
            background: #ffd6e7;
            color: #5b4b57;
            border-radius: 20px;
            padding: 6px 20px;
            font-family: 'Caveat', cursive;
            font-size: 1.2rem;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 12px;
        }

        /* Glow hover */
        .glow-hover {
            transition: all 0.4s ease;
        }
        .glow-hover:hover {
            box-shadow: 0 0 30px rgba(255, 182, 193, 0.5), 0 0 60px rgba(255, 143, 171, 0.25);
            transform: translateY(-4px);
        }

        /* Section divider */
        .section-divider {
            text-align: center;
            font-size: 2rem;
            letter-spacing: 6px;
            color: #ffb6c1;
            padding: 20px 0;
            opacity: 0.7;
        }

        /* Nav link */
        .nav-link {
            position: relative;
            transition: color 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #ff8fab;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        @media (max-width: 768px) {
            .hide-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & Babel CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ==================== CONFIGURATION ====================
        // Replace these with your actual Google Drive file IDs
        const CONFIG = {
            startDate: '2024-05-14', // Your relationship start date (YYYY-MM-DD)
            yourName: 'Nat',
            partnerName: 'Julie',
            // Google Drive image IDs - replace with your actual IDs
            heroImageId: '1abc123placeholder', // Hero section photo
            // Gallery images organized by category
            galleryImages: [
                { id: '1', driveId: 'https://drive.google.com/file/d/16bOR5sCDREw44eHpiIHhFM5xSjO1vmgE/view?usp=drive_link', category: 'Dates', caption: 'Foodtrip masaya HAHAHAHA', date: '2025-08' },
                { id: '2', driveId: 'https://drive.google.com/file/d/1eRvbCqJZT2Fqgn_mSqZOvPD83S5KBV8u/view?usp=drive_link', category: 'Dates', caption: 'Canteen Date', date: '2025-08' },
                { id: '3', driveId: 'https://drive.google.com/file/d/1dCJdAzl7bGvfz8CqxdVG5uDtkuV5tIaU/view?usp=drive_link', category: 'School', caption: 'Study session together na may kasamang bebe time', date: '2024-05-07' },
                { id: '4', driveId: 'https://drive.google.com/file/d/19A-YK6xRJuPYX998HeDKpzuTYFODbkta/view?usp=drive_link', category: 'School', caption: 'Work Mode siya', date: '2026-04' },
                { id: '5', driveId: 'https://drive.google.com/file/d/1D24pQBUwc3irrjxbMrVTHLD24Jf12FkP/view?usp=drive_link', category: 'Random Cute Moments', caption: 'Hospital Visits', date: '2026-04-15' },
                { id: '12', driveId: 'https://drive.google.com/file/d/17wHzpw0Qb6dWy7ySqCYgvsgLri9pCaKc/view?usp=drive_link', category: 'Dates', caption: 'Anniversary Date', date: '2025-01-15' },
            ],
            // Spotify playlist URL
            spotifyPlaylistUrl: '',
        };

        // Helper: Convert Google Drive ID or URL to thumbnail URL
        function getDriveThumbnail(driveIdOrUrl, size = 400) {
            let fileId = driveIdOrUrl;
            // Extract ID from various URL formats
            const match = driveIdOrUrl.match(/\/d\/([^/]+)/) ||
                driveIdOrUrl.match(/[?&]id=([^&]+)/) ||
                driveIdOrUrl.match(/\/file\/d\/([^/]+)/);
            if (match) fileId = match[1];
            if (fileId.includes('drive.google.com')) fileId = driveIdOrUrl; // fallback
            return `https://drive.google.com/thumbnail?id=${fileId}&sz=w${size}`;
        }

        function getDriveFull(driveIdOrUrl) {
            let fileId = driveIdOrUrl;
            const match = driveIdOrUrl.match(/\/d\/([^/]+)/) ||
                driveIdOrUrl.match(/[?&]id=([^&]+)/) ||
                driveIdOrUrl.match(/\/file\/d\/([^/]+)/);
            if (match) fileId = match[1];
            return `https://drive.google.com/uc?export=view&id=${fileId}`;
        }

        // ==================== HELPER HOOKS ====================
        function useInView(threshold = 0.15) {
            const ref = useRef(null);
            const [isInView, setIsInView] = useState(false);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const observer = new IntersectionObserver(
                    ([entry]) => { if (entry.isIntersecting) setIsInView(true); }, { threshold }
                );
                observer.observe(el);
                return () => observer.disconnect();
            }, [threshold]);
            return [ref, isInView];
        }

        // ==================== COMPONENTS ====================

        // --- Preloader ---
        function Preloader({ onLoaded }) {
            const [hidden, setHidden] = useState(false);
            useEffect(() => {
                const timer = setTimeout(() => {
                    setHidden(true);
                    setTimeout(onLoaded, 600);
                }, 1800);
                return () => clearTimeout(timer);
            }, [onLoaded]);
            return (
                <div className={`preloader ${hidden ? 'hidden' : ''}`}>
                    <span className="heart-loader">💗</span>
                    <p className="mt-4 text-text-dark font-handwritten text-2xl" style={{ letterSpacing: '2px' }}>
                        Loading our story...
                    </p>
                    <div className="mt-4 flex gap-1">
                        <div className="w-2 h-2 rounded-full bg-main-pink animate-bounce" style={{ animationDelay: '0s' }}></div>
                        <div className="w-2 h-2 rounded-full bg-rose animate-bounce" style={{ animationDelay: '0.15s' }}></div>
                        <div className="w-2 h-2 rounded-full bg-lavender animate-bounce" style={{ animationDelay: '0.3s' }}></div>
                    </div>
                </div>
            );
        }

        // --- Background Particles ---
        function BackgroundParticles() {
            const petals = useMemo(() => {
                const items = [];
                const emojis = ['🌸', '💮', '🩷', '✿', '🌷', '♡'];
                for (let i = 0; i < 25; i++) {
                    items.push({
                        id: i,
                        emoji: emojis[i % emojis.length],
                        left: Math.random() * 100,
                        delay: Math.random() * 15,
                        duration: 8 + Math.random() * 14,
                        size: 14 + Math.random() * 22,
                        opacity: 0.25 + Math.random() * 0.5,
                    });
                }
                return items;
            }, []);
            const hearts = useMemo(() => {
                const items = [];
                for (let i = 0; i < 12; i++) {
                    items.push({
                        id: i,
                        left: Math.random() * 100,
                        delay: Math.random() * 10,
                        duration: 3 + Math.random() * 6,
                        size: 10 + Math.random() * 18,
                    });
                }
                return items;
            }, []);

            return (
                <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden" style={{ pointerEvents: 'none' }}>
                    {petals.map(p => (
                        <span key={p.id} className="absolute" style={{
                            left: `${p.left}%`,
                            top: '-40px',
                            fontSize: `${p.size}px`,
                            opacity: p.opacity,
                            animation: `fall ${p.duration}s linear ${p.delay}s infinite`,
                            filter: 'blur(0.5px)',
                        }}>{p.emoji}</span>
                    ))}
                    {hearts.map(h => (
                        <span key={`h-${h.id}`} className="absolute" style={{
                            left: `${h.left}%`,
                            bottom: '-20px',
                            fontSize: `${h.size}px`,
                            opacity: 0.5,
                            animation: `rise ${h.duration}s ease-out ${h.delay}s infinite`,
                        }}>♡</span>
                    ))}
                </div>
            );
        }

        // --- Navbar ---
        function Navbar() {
            const [menuOpen, setMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 60);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            const links = [
                { label: 'Home', href: '#home' },
                { label: 'Our Story', href: '#story' },
                { label: 'Memories', href: '#gallery' },
                { label: 'Letters', href: '#letters' },
                { label: 'Playlist', href: '#playlist' },
                { label: 'Future', href: '#future' },
            ];

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'glass-strong py-3' : 'bg-transparent py-5'}`}>
                    <div className="max-w-6xl mx-auto px-4 flex items-center justify-between">
                        <a href="#home" className="flex items-center gap-2 no-underline">
                            <span className="text-3xl">💗</span>
                            <span className="font-handwritten text-2xl text-rose font-semibold tracking-wide">
                                N ♡ J
                            </span>
                        </a>
                        {/* Desktop nav */}
                        <div className="hidden md:flex gap-6 items-center">
                            {links.map(l => (
                                <a key={l.href} href={l.href} className="nav-link text-text-dark font-body text-sm font-medium tracking-wide no-underline hover:text-rose transition-colors">
                                    {l.label}
                                </a>
                            ))}
                        </div>
                        {/* Mobile hamburger */}
                        <button className="md:hidden text-2xl text-text-dark focus:outline-none z-50"
                            onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
                            {menuOpen ? '✕' : '☰'}
                        </button>
                    </div>
                    {/* Mobile menu */}
                    <div className={`md:hidden transition-all duration-400 overflow-hidden ${menuOpen ? 'max-h-80 opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="glass-strong mx-4 mt-2 py-4 px-6 flex flex-col gap-3 rounded-2xl">
                            {links.map(l => (
                                <a key={l.href} href={l.href} className="text-text-dark font-body text-sm font-medium no-underline hover:text-rose transition-colors py-1"
                                    onClick={() => setMenuOpen(false)}>{l.label}</a>
                            ))}
                        </div>
                    </div>
                </nav>
            );
        }

        // --- Hero Section ---
        function HeroSection({ onPlayMusic, isMusicPlaying }) {
            const [ref, inView] = useInView(0.2);
            return (
                <section id="home" ref={ref} className="relative min-h-screen flex items-center justify-center overflow-hidden"
                    style={{
                        background: 'linear-gradient(170deg, #ffd6e7 0%, #fff7fb 30%, #ffe4ec 60%, #fff7fb 100%)',
                    }}>
                    {/* Decorative gradient orbs */}
                    <div className="absolute top-20 left-10 w-72 h-72 rounded-full bg-main-pink opacity-20 blur-3xl animate-float-slow"></div>
                    <div className="absolute bottom-20 right-10 w-80 h-80 rounded-full bg-lavender opacity-20 blur-3xl animate-float"></div>
                    <div className="absolute top-1/3 right-1/4 w-48 h-48 rounded-full bg-rose opacity-15 blur-3xl animate-pulse-soft"></div>

                    <div className={`relative z-10 text-center px-4 max-w-3xl transition-all duration-1000 ${inView ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                        {/* Photo area */}
                        <div className="mx-auto mb-8 w-48 h-48 sm:w-56 sm:h-56 rounded-full overflow-hidden border-4 border-white shadow-2xl glow-hover"
                            style={{ boxShadow: '0 0 40px rgba(255,182,193,0.4), 0 8px 30px rgba(255,143,171,0.2)' }}>
                            <img
                                src={getDriveThumbnail(CONFIG.heroImageId, 400)}
                                alt="Us"
                                className="w-full h-full object-cover"
                                onError={(e) => { e.target.style.display = 'none'; e.target.parentElement.innerHTML =
                                        '<div class="w-full h-full flex items-center justify-center bg-soft-pink text-rose text-5xl">💑</div>'; }}
                            />
                        </div>

                        <h1 className="font-display text-3xl sm:text-4xl md:text-5xl lg:text-6xl text-text-dark font-bold italic mb-4 leading-tight">
                            Every moment with you<br className="hide-mobile" /> became my <span className="text-rose">favorite memory</span>.
                        </h1>
                        <p className="font-handwritten text-2xl sm:text-3xl text-rose mb-8">Since 2024 ♡</p>
                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <a href="#story"
                                className="inline-block px-8 py-3.5 bg-rose text-white rounded-full font-body font-semibold text-sm tracking-wide no-underline shadow-lg hover:shadow-xl transition-all duration-300 hover:bg-main-pink hover:scale-105">
                                ✦ Open Our Story
                            </a>
                            <button onClick={onPlayMusic}
                                className="inline-block px-8 py-3.5 glass-strong text-text-dark rounded-full font-body font-semibold text-sm tracking-wide cursor-pointer hover:scale-105 transition-all duration-300">
                                {isMusicPlaying ? '🎵 Pause Music' : '🎵 Play Music'}
                            </button>
                        </div>
                        <p className="mt-6 text-text-dark text-xs opacity-50 font-body">Scroll down to explore our love story</p>
                        <div className="mt-4 animate-bounce text-2xl opacity-60">↓</div>
                    </div>
                </section>
            );
        }

        // --- Timeline Section ---
        function TimelineSection() {
            const [ref, inView] = useInView(0.1);
            const timelineData = [
                {
                    year: '2024',
                    color: '#ffb6c1',
                    memories: [
                        { title: 'First stolen shot of you', desc: 'Ganda mo kasi.', date: 'May 3, 2024',
                            imgId: 'https://drive.google.com/file/d/1dABKFZqtJmvew9JjBsMutW6JBgcRtlQm/view?usp=drive_link' },

        function Lightbox({ image, onClose }) {

                window.addEventListener('keydown', handleEsc);
                document.body.style.overflow = 'hidden';
                return () => {
                    window.removeEventListener('keydown', handleEsc);
                    document.body.style.overflow = '';
                };
            }, [onClose]);
            return (
                <div className="lightbox-overlay" onClick={onClose}>
                    <div className="relative max-w-4xl w-full mx-4 max-h-[90vh] flex flex-col items-center" onClick={e => e.stopPropagation()}>

        // ==================== MAIN APP ====================
        function App() {
            const [loaded, setLoaded] = useState(false);
            const [lightboxImage, setLightboxImage] = useState(null);
            const [isMusicPlaying, setIsMusicPlaying] = useState(false);
            const audioRef = useRef(null);

            // Initialize audio
            useEffect(() => {
                // Create audio element for background music
                // Replace with your own audio file URL
                const audio = new Audio();
                audio.loop = true;
                audio.volume = 0.4;
                // Using a free ambient track - replace with your own
                audio.src =
                    'https://www.image2url.com/r2/default/audio/1779504014073-0d03961c-2883-413f-b49d-27541f3f4388.mp3';
                audioRef.current = audio;
                return () => { audio.pause();
                    audio.src = ''; };
            }, []);

            const handlePlayMusic = () => {
  if (!audioRef.current) return;
  if (isMusicPlaying) {
    audioRef.current.pause();
    setIsMusicPlaying(false);
  } else {
    audioRef.current.play()
      .then(() => setIsMusicPlaying(true))
      .catch(err => {
        console.error('Play failed:', err);
        alert('Could not play music. Please check the URL or try again.');
      });
  }
};

            const handleImageClick = useCallback((img) => {
                setLightboxImage(img);
            }, []);

            if (!loaded) {
                return <Preloader onLoaded={() => setLoaded(true)} />;
            }

            return (
                <div className="relative min-h-screen">
                    <BackgroundParticles />
                    <Navbar />
                    <HeroSection onPlayMusic={handlePlayMusic} isMusicPlaying={isMusicPlaying} />
                    <TimelineSection />
                    <GallerySection onImageClick={handleImageClick} />
                    <LettersSection />
                    <PlaylistSection />
                    <FutureDreamsSection />
                    <Footer />
                    <Lightbox image={lightboxImage} onClose={() => setLightboxImage(null)} />

                    {/* Floating music indicator */}
                    {isMusicPlaying && (
                        <div className="fixed bottom-6 right-6 z-40 glass-strong px-4 py-2 rounded-full flex items-center gap-2 animate-float-slow shadow-lg cursor-pointer"
                            onClick={handlePlayMusic}>
                            <span className="text-lg">🎵</span>
                            <span className="text-xs text-text-dark font-body">Playing...</span>
                            <div className="flex gap-0.5 items-end h-4">
                                <div className="w-1 bg-rose rounded-full animate-bounce" style={{ height: '8px', animationDelay: '0s' }}></div>
                                <div className="w-1 bg-rose rounded-full animate-bounce" style={{ height: '14px', animationDelay: '0.2s' }}></div>
                                <div className="w-1 bg-rose rounded-full animate-bounce" style={{ height: '10px', animationDelay: '0.4s' }}></div>
                                <div className="w-1 bg-rose rounded-full animate-bounce" style={{ height: '16px', animationDelay: '0.6s' }}></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==================== RENDER ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
